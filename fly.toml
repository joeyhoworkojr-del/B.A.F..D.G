# Fly.io config for StatEdge — single app: API + frontend in one image.
# Deploy: fly deploy  (from the repo root)
# If the app name is taken, `fly apps create <name>` and update `app` below.

app = "statedge-api"
primary_region = "dfw"   # Dallas — closest to the World Cup action

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  LOG_LEVEL = "INFO"
  API_HOST = "0.0.0.0"
  API_PORT = "8000"
  MONTE_CARLO_SIMS = "50000"
  ELO_MU = "1.35"
  ELO_Q = "1200"
  ELO_HOST_EDGE = "150"
  SR_BLEND_WEIGHT = "0.60"
  # NOTE: the ledger is currently ephemeral (reset on each deploy). To make it
  # durable, attach a Fly volume and set LEDGER_PATH=/data/ledger.db — this
  # needs an interactive `fly deploy` to attach the volume to the machine, so
  # it isn't wired into the automated pipeline. See DEPLOYMENT.md.

# Secrets (set via: fly secrets set KEY=value --app statedge-api)
# Optional: DATABASE_URL, REDIS_URL, FOOTBALL_DATA_API_KEY, SPORTRADAR_API_KEY

[[services]]
  protocol = "tcp"
  internal_port = 8000
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
