name: Deploy Elysium site to GitHub Pages

# Builds the Next.js site in elysium-bio-labs/ as a static export and publishes
# it to GitHub Pages. The job enables Pages itself (configure-pages), so no
# manual repository setting is required — it just needs to run on the default
# branch. Trigger manually any time via the "Run workflow" button.
on:
  push:
    branches: [main]
    paths:
      - "elysium-bio-labs/**"
      - ".github/workflows/deploy-elysium-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elysium-bio-labs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: elysium-bio-labs/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages via the API if it isn't already, and expose base_path.
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Remove server-only API route (not supported by static export)
        run: rm -rf app/api

      - name: Build static export
        env:
          STATIC_EXPORT: "1"
          NEXT_PUBLIC_STATIC_EXPORT: "1"
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.origin }}${{ steps.pages.outputs.base_path }}
        run: |
          npm run build
          touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: elysium-bio-labs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
