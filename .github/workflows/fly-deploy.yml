name: Deploy to Fly.io

# Deploys the combined app (API + frontend, one image) on every push to main,
# once FLY_API_TOKEN is set (repo Settings → Secrets and variables → Actions).
# One-time setup is documented in DEPLOYMENT.md.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Run backend tests
        run: cd backend && PYTHONPATH=. pytest tests/ -q
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Type-check frontend
        run: cd frontend && npm ci && npm run type-check

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Fail fast if FLY_API_TOKEN secret is missing
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::error::No Fly token found. Add a repo Actions secret named FLY_API_TOKEN (or ORG) containing your Fly org token."
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN || secrets.ORG || secrets.FLY_ORG || secrets.ORG_TOKEN || secrets.FLY_ORG_TOKEN }}
      - name: Ensure persistent data volume exists
        run: |
          if flyctl volumes list -a statedge-api 2>/dev/null | grep -qw statedge_data; then
            echo "Volume statedge_data already exists."
          else
            echo "Creating volume statedge_data in dfw..."
            flyctl volumes create statedge_data --region dfw --size 1 -a statedge-api --yes
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN || secrets.ORG || secrets.FLY_ORG || secrets.ORG_TOKEN || secrets.FLY_ORG_TOKEN }}
      - name: Deploy combined app
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN || secrets.ORG || secrets.FLY_ORG || secrets.ORG_TOKEN || secrets.FLY_ORG_TOKEN }}
