name: Deploy to Fly.io

# Deploys the combined app (API + frontend, one image) on every push to main,
# once FLY_API_TOKEN is set (repo Settings → Secrets and variables → Actions).
# One-time setup is documented in DEPLOYMENT.md.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Run backend tests
        run: cd backend && PYTHONPATH=. pytest tests/ -q
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Type-check frontend
        run: cd frontend && npm ci && npm run type-check

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Fail fast if FLY_API_TOKEN secret is missing
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "::error::FLY_API_TOKEN secret is not set. Go to fly.io/user/personal_access_tokens, create a token, then add it at Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Deploy combined app
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
