server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Resolve the API upstream at request time (variable proxy_pass), so nginx
  # boots even on platforms where the compose hostname "api" doesn't exist
  # (e.g. Fly.io, where the frontend calls the API cross-origin instead).
  resolver ${NGINX_RESOLVER} valid=30s ipv6=off;

  # Forward API calls to the backend
  location /api/ {
    set $api_upstream ${API_UPSTREAM};
    proxy_pass http://$api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 30s;
  }

  location /health {
    set $api_upstream ${API_UPSTREAM};
    proxy_pass http://$api_upstream;
    proxy_http_version 1.1;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1000;
}
